<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Empresas - STEFANY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--primary);
        }
        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 200px;
            border-top: 5px solid var(--success);
        }
        .card h2 {
            margin: 0;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
        .card .number {
            font-size: 4rem;
            font-weight: bold;
            color: var(--success);
            margin: 10px 0 0 0;
        }
        table {
            width: 100%;
            max-width: 1000px;
            border-collapse: collapse;
            background-color: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }
        th {
            background-color: var(--primary);
            color: white;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .status-badge {
            background-color: var(--success);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Reporte de Gestión: STEFANY</h1>
        <p>Actualización automática desde Google Sheets</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>Empresas Aprobadas y Finalizadas</h2>
            <div class="number" id="contador">0</div>
        </div>
    </div>

    <table id="tabla-reporte">
        <thead>
            <tr>
                <th>Vigencia</th>
                <th>Empresa</th>
                <th>Observaciones</th>
                <th>IP2</th>
                <th>Estado General</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            <tr>
                <td colspan="5" style="text-align: center;">Cargando datos en vivo...</td>
            </tr>
        </tbody>
    </table>

    <script>
        // Enlace corregido a formato CSV
        const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREKYHN32PLKhhCu4ERe0k34ATr6cks2l1LzOs_gnm1e60aBbmGNQP2vwcujLbpow/pub?gid=1934689070&single=true&output=csv";

        function cargarDatos() {
            Papa.parse(urlCSV, {
                download: true,
                header: true,
                complete: function(results) {
                    procesarReporte(results.data);
                },
                error: function(err) {
                    console.error("Error al cargar:", err);
                    document.getElementById("cuerpo-tabla").innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Error al cargar. Verifica la conexión.</td></tr>';
                }
            });
        }

        function procesarReporte(datos) {
            let empresasAprobadas = [];

            datos.forEach(fila => {
                // Extracción segura de columnas
                const supervisor = fila["Supervisor"] ? fila["Supervisor"].trim().toUpperCase() : "";
                const observaciones = fila["OBSERVACIONES "] ? fila["OBSERVACIONES "].trim().toUpperCase() : "";
                const ip2 = fila["IP2"] ? fila["IP2"].trim().toUpperCase() : "";
                
                // Columnas de ejemplo para verificar que todo esté completo (ajústalas si tienes más)
                const diagRealizados = fila["DIAGNOSTICOS REALIZADOS"] ? fila["DIAGNOSTICOS REALIZADOS"].trim().toUpperCase() : "";
                const diagFirmados = fila["DIAGNOSTICO FIRMADOS"] ? fila["DIAGNOSTICO FIRMADOS"].trim().toUpperCase() : "";

                // Evaluando las condiciones solicitadas
                const esDeStefany = supervisor.includes("STEFANY");
                const estaAprobada = observaciones === "APROBADA" || observaciones === "APROVADA" || observaciones === "APROBADAS";
                const tieneIP2 = ip2 === "SI";
                
                // Condición de llenado (SI / OK)
                const columnasCompletas = (diagRealizados === "SI" || diagRealizados === "OK") && (diagFirmados === "SI" || diagFirmados === "OK");

                if (esDeStefany && estaAprobada && tieneIP2 && columnasCompletas) {
                    empresasAprobadas.push(fila);
                }
            });

            mostrarEnPantalla(empresasAprobadas);
        }

        function mostrarEnPantalla(empresas) {
            document.getElementById("contador").innerText = empresas.length;
            const cuerpoTabla = document.getElementById("cuerpo-tabla");
            cuerpoTabla.innerHTML = ""; 

            if (empresas.length === 0) {
                cuerpoTabla.innerHTML = '<tr><td colspan="5" style="text-align: center;">No hay empresas que cumplan todas las condiciones en este momento.</td></tr>';
                return;
            }

            empresas.forEach(emp => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${emp["Vigencia"] || "-"}</td>
                    <td><strong>${emp["EMPRESAS "] || "Sin nombre"}</strong></td>
                    <td>${emp["OBSERVACIONES "] || "-"}</td>
                    <td>${emp["IP2"] || "-"}</td>
                    <td><span class="status-badge">Lista / Aprobada</span></td>
                `;
                cuerpoTabla.appendChild(tr);
            });
        }

        // Iniciar la carga al abrir
        cargarDatos();
    </script>
</body>
</html>
